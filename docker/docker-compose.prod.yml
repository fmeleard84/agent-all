services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - internal

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../apps/api/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=https://agent-all.ialla.fr
      - QDRANT_URL=http://host.docker.internal:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent-all-api.rule=Host(`agent-all.ialla.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.agent-all-api.entrypoints=websecure"
      - "traefik.http.routers.agent-all-api.tls.certresolver=myresolver"
      - "traefik.http.services.agent-all-api.loadbalancer.server.port=3001"
      - "traefik.http.middlewares.agent-all-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.agent-all-api.middlewares=agent-all-api-strip"
    networks:
      - traefik_proxy
      - internal
    depends_on:
      - redis

  workers:
    build:
      context: ..
      dockerfile: apps/workers/Dockerfile
    env_file:
      - ../apps/workers/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://host.docker.internal:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    depends_on:
      - redis

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=https://yojesskmdehepeqkdelp.supabase.co
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_API_URL=https://agent-all.ialla.fr/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent-all-web.rule=Host(`agent-all.ialla.fr`)"
      - "traefik.http.routers.agent-all-web.entrypoints=websecure"
      - "traefik.http.routers.agent-all-web.tls.certresolver=myresolver"
      - "traefik.http.services.agent-all-web.loadbalancer.server.port=3000"
      - "traefik.http.routers.agent-all-web.priority=1"
    networks:
      - traefik_proxy
    depends_on:
      - api

networks:
  traefik_proxy:
    external: true
  internal:

volumes:
  redis-data:
